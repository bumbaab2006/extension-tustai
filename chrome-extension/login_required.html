<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Нэвтрэх шаардлагатай</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --border: #e2e8f0;
        --accent: #2563eb;
        --accent-soft: #e0e7ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        font-family: "SF Pro Text", "SF Pro Display", "Segoe UI", system-ui,
          -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
        color: var(--text);
      }

      .card {
        background: var(--card);
        padding: 38px 34px;
        border-radius: 20px;
        box-shadow: 0 30px 60px rgba(15, 23, 42, 0.12);
        text-align: center;
        max-width: 480px;
        border: 1px solid var(--border);
      }

      .icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 16px;
        border-radius: 20px;
        background: var(--accent-soft);
        color: var(--accent);
        display: grid;
        place-items: center;
        font-size: 30px;
        font-weight: 700;
      }

      h1 {
        font-size: 26px;
        margin: 0 0 12px;
        font-weight: 700;
      }

      p {
        font-size: 15px;
        color: var(--muted);
        line-height: 1.6;
        margin: 0;
      }

      .highlight {
        color: var(--accent);
        font-weight: 600;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="icon">🔒</div>
      <h1>Нэвтрэх шаардлагатай</h1>
      <p>
        Интернэт ашиглахын тулд баруун дээд буланд байрлах
        <span class="highlight">SafeKid extension</span>
        дээр дарж нэвтэрнэ үү.
      </p>
    </div>
  </body>
</html>
